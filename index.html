<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Engine</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 6px;
        }

        p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        .status-panel {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: none;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--border);
        }

        .badge.connected {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .log-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            max-height: 120px;
            overflow-y: auto;
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Notification Gateway</h1>
        <p>Keep this tab open in the background. It will securely pull updates from Firebase and trigger desktop system notifications.</p>

        <div id="setup-form">
            <div class="form-group">
                <label for="apiKey">API Key</label>
                <input type="text" id="apiKey" placeholder="AIzaSy...">
            </div>
            <div class="form-group">
                <label for="databaseURL">Database URL</label>
                <input type="text" id="databaseURL" placeholder="https://your-app-default-rtdb.firebaseio.com">
            </div>
            <div class="form-group">
                <label for="projectId">Project ID</label>
                <input type="text" id="projectId" placeholder="your-app-id">
            </div>
            <button id="btn-save">Connect & Save Credentials</button>
        </div>

        <div id="monitor-panel" class="status-panel">
            <div class="status-row">
                <span>Engine Status:</span>
                <span id="sync-badge" class="badge">Connecting</span>
            </div>
            <div id="log" class="log-box">Initializing listener loop...</div>
            <button id="btn-reset" style="background: var(--border); color: var(--text); margin-top: 15px;">Clear Config</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const logBox = document.getElementById('log');
        const syncBadge = document.getElementById('sync-badge');
        let localProfilesCache = {};
        let isFirstLoad = true;

        function addLog(text) {
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML += `<div>[${time}] ${text}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function triggerNotification(title, message) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(title, {
                    body: message,
                    tag: 'fb-update'
                });
            }
        }

        // Initialize background operations
        function startSyncEngine(config) {
            document.getElementById('setup-form').style.display = 'none';
            document.getElementById('monitor-panel').style.display = 'block';

            try {
                const app = initializeApp(config);
                const db = getDatabase(app);
                const profilesRef = ref(db, 'profiles');

                addLog("Connecting to Firebase streams...");

                onValue(profilesRef, (snapshot) => {
                    const data = snapshot.val() || {};
                    syncBadge.innerText = "Active Sync";
                    syncBadge.className = "badge connected";

                    if (!isFirstLoad) {
                        Object.keys(data).forEach(id => {
                            const oldStatus = localProfilesCache[id];
                            const newStatus = data[id];

                            if (oldStatus !== undefined && oldStatus !== newStatus) {
                                const msg = `Profile ${id} moved from [${oldStatus}] to [${newStatus}]`;
                                addLog(msg);
                                triggerNotification(`System Update`, msg);
                            }
                        });
                    } else {
                        isFirstLoad = false;
                        addLog(`Baseline loaded. Tracking ${Object.keys(data).length} active profiles.`);
                    }

                    localProfilesCache = { ...data };
                }, (error) => {
                    addLog(`Sync error: ${error.message}`);
                    syncBadge.innerText = "Error";
                    syncBadge.className = "badge";
                });

            } catch (err) {
                addLog(`Initialization failed: ${err.message}`);
            }
        }

        // Request browser alert privileges 
        if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        // Load cached credentials on startup if they exist
        const savedConfig = localStorage.getItem('fb_notify_config');
        if (savedConfig) {
            startSyncEngine(JSON.parse(savedConfig));
        }

        // Save layout configuration handler
        document.getElementById('btn-save').addEventListener('click', () => {
            const config = {
                apiKey: document.getElementById('apiKey').value.trim(),
                databaseURL: document.getElementById('databaseURL').value.trim(),
                projectId: document.getElementById('projectId').value.trim()
            };

            if (!config.apiKey || !config.databaseURL || !config.projectId) {
                alert("Please fill in all configuration inputs.");
                return;
            }

            localStorage.setItem('fb_notify_config', JSON.stringify(config));
            
            if ("Notification" in window && Notification.permission !== "granted") {
                Notification.requestPermission().then(() => {
                    startSyncEngine(config);
                });
            } else {
                startSyncEngine(config);
            }
        });

        // Hard wipe configuration access tool
        document.getElementById('btn-reset').addEventListener('click', () => {
            localStorage.removeItem('fb_notify_config');
            window.location.reload();
        });
    </script>
</body>
</html>
